<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SIRI-DLHK — Sistem Informasi Retribusi Sampah Rumah Tangga</title>
  <link rel="icon" type="image/png" href="./img/logo-kota-jayapura.png"/>
  <link rel="apple-touch-icon" href="./img/logo-kota-jayapura.png"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    [x-cloak] { display: none !important; }
    .drag-active { border-color: #22c55e !important; background-color: #f0fdf4 !important; }
    .sidebar-link.active { background:#dcfce7; color:#166534; font-weight:600; border-left:3px solid #22c55e; }
    .sidebar-link { border-left:3px solid transparent; }
    .badge-green  { background:#dcfce7; color:#166534; }
    .badge-blue   { background:#dbeafe; color:#1e40af; }
    .badge-yellow { background:#fef9c3; color:#854d0e; }
    .badge-red    { background:#fee2e2; color:#991b1b; }
    .card-stat { transition: border-color .2s; }
    .card-stat:hover { border-color:#22c55e; }
    input:focus, select:focus, textarea:focus { outline:none; border-color:#22c55e; }
    select { cursor:pointer; }
    .table-row:hover { background:#f0fdf4; }
    .btn-primary   { background:#22c55e; color:#fff; }
    .btn-primary:hover { background:#16a34a; }
    .btn-secondary { background:#0ea5e9; color:#fff; }
    .btn-secondary:hover { background:#0284c7; }
    .btn-warning   { background:#f59e0b; color:#fff; }
    .btn-warning:hover { background:#d97706; }
    .btn-danger    { background:#ef4444; color:#fff; }
    .btn-danger:hover { background:#dc2626; }
    .modal-backdrop { background:rgba(0,0,0,.45); }
    ::-webkit-scrollbar { width:6px; } ::-webkit-scrollbar-track { background:#f1f5f9; } ::-webkit-scrollbar-thumb { background:#94a3b8; border-radius:9px; }
  </style>
</head>
<body class="bg-gray-50 font-sans antialiased text-gray-700" x-data="app()" x-cloak>

<!-- ============================================================
     SIDEBAR
============================================================ -->
<aside class="fixed top-0 left-0 h-screen w-64 bg-white flex flex-col z-30 border-r border-gray-100">
  <!-- Logo -->
  <div class="flex items-center gap-3 px-5 py-5 border-b border-gray-100">
    <div class="w-10 h-10 rounded-md bg-white flex items-center justify-center overflow-hidden">
      <img src="./img/logo-kota-jayapura.png" alt="Logo Kota Jayapura" class="w-full h-full object-contain"/>
    </div>
    <div>
      <p class="font-bold text-green-700 text-sm leading-tight">SIRI-DLHK</p>
      <p class="text-gray-400 text-[10px] leading-tight">Kota Jayapura</p>
    </div>
  </div>

  <!-- Role Switcher -->
  <div class="px-4 py-3 border-b border-gray-100">
    <label class="text-[10px] font-semibold text-gray-400 uppercase tracking-wider mb-1 block">Login sebagai</label>
    <select x-model="currentRole" @change="currentPage='dasbor'"
      class="w-full text-xs border border-gray-200 rounded-md px-2 py-1.5 bg-gray-50 text-gray-700 cursor-pointer">
      <option value="admin">Admin Master</option>
      <option value="dlhk">Operator DLHK</option>
      <option value="kelurahan">Operator Kelurahan</option>
      <option value="klien">Klien (Kelurahan)</option>
    </select>
  </div>

  <!-- Nav -->
  <nav class="flex-1 overflow-y-auto py-3 px-2 space-y-0.5">
    <template x-for="item in navItems()" :key="item.page">
      <button @click="currentPage=item.page"
        :class="currentPage===item.page ? 'active' : ''"
        class="sidebar-link w-full flex items-center gap-3 px-3 py-2.5 rounded-md text-sm text-gray-600 hover:bg-gray-50 transition-all text-left">
        <i :class="item.icon" class="w-4 text-center text-green-500"></i>
        <span x-text="item.label"></span>
      </button>
    </template>
  </nav>
</aside>

<!-- ============================================================
     MAIN CONTENT
============================================================ -->
<div class="ml-64 min-h-screen flex flex-col">

  <!-- Top bar -->
  <header class="sticky top-0 z-20 bg-white border-b border-gray-100 px-6 py-3 flex items-center gap-4">
    <div>
      <h1 class="font-bold text-gray-800 text-base leading-tight" x-text="pageTitle()"></h1>
      <p class="text-[11px] text-gray-400">Sistem Informasi Retribusi Sampah Rumah Tangga</p>
    </div>
    <div class="ml-auto flex items-center gap-3">
      <div class="relative">
        <i class="fa-solid fa-bell text-gray-400 text-sm cursor-pointer hover:text-yellow-500 transition"></i>
        <span class="absolute -top-1 -right-1 w-3.5 h-3.5 bg-red-500 text-white text-[8px] rounded-full flex items-center justify-center">3</span>
      </div>

      <!-- User dropdown -->
      <div class="relative" x-data="{ open:false }" @keydown.escape="open=false">
        <button @click="open=!open"
          class="flex items-center gap-2 pl-1 pr-2 py-1 rounded-full hover:bg-gray-50 transition">
          <div class="w-7 h-7 rounded-full bg-green-500 flex items-center justify-center">
            <i class="fa-solid fa-user text-white text-[10px]"></i>
          </div>
          <div class="hidden sm:block text-left leading-tight">
            <p class="text-xs font-semibold text-gray-700" x-text="userName"></p>
            <p class="text-[10px] text-gray-400" x-text="roleLabel()"></p>
          </div>
          <i class="fa-solid fa-chevron-down text-gray-400 text-[10px] transition" :class="open?'rotate-180':''"></i>
        </button>

        <div x-show="open" x-transition.opacity @click.away="open=false"
          class="absolute right-0 mt-2 w-56 bg-white rounded-md border border-gray-100 shadow-lg z-50 overflow-hidden">
          <div class="px-4 py-3 border-b border-gray-100 flex items-center gap-3">
            <div class="w-9 h-9 rounded-full bg-green-100 flex items-center justify-center">
              <i class="fa-solid fa-user text-green-600 text-sm"></i>
            </div>
            <div class="leading-tight">
              <p class="text-xs font-semibold text-gray-700" x-text="userName"></p>
              <p class="text-[10px] text-gray-400" x-text="roleLabel()"></p>
            </div>
          </div>
          <div class="py-1">
            <div class="px-4 py-2 text-[11px] text-gray-400 flex items-center gap-2">
              <i class="fa-solid fa-circle text-green-500 text-[7px]"></i> Aktif sekarang
            </div>
            <button @click="logout()"
              class="w-full text-left px-4 py-2.5 text-xs text-red-600 hover:bg-red-50 transition flex items-center gap-2 font-medium">
              <i class="fa-solid fa-arrow-right-from-bracket"></i> Keluar
            </button>
          </div>
        </div>
      </div>
    </div>
  </header>

  <main class="flex-1 p-6 space-y-6">

    <!-- ======================================================
         DASBOR
    ====================================================== -->
    <template x-if="currentPage==='dasbor'">
      <div class="space-y-6">
        <!-- Stat Cards -->
        <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-4">
          <template x-for="s in stats()" :key="s.label">
            <div class="card-stat bg-white rounded-md p-5 flex items-center gap-4 border border-gray-100">
              <div :class="s.bg" class="w-12 h-12 rounded-md flex items-center justify-center">
                <i :class="s.icon" class="text-xl" :style="`color:${s.color}`"></i>
              </div>
              <div>
                <p class="text-xs text-gray-400" x-text="s.label"></p>
                <p class="text-2xl font-bold text-gray-800" x-text="s.value"></p>
                <p class="text-[10px] text-green-600 font-medium" x-text="s.sub"></p>
              </div>
            </div>
          </template>
        </div>

        <!-- Charts row -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
          <!-- Realisasi Bulanan -->
          <div class="lg:col-span-2 bg-white rounded-md p-5 border border-gray-100">
            <div class="flex items-center justify-between mb-4">
              <p class="font-semibold text-gray-700 text-sm">Realisasi Retribusi Bulanan</p>
              <span class="badge-green text-[10px] px-2 py-0.5 rounded-full font-medium">2025</span>
            </div>
            <!-- Simple SVG bar chart -->
            <svg viewBox="0 0 520 140" class="w-full" xmlns="http://www.w3.org/2000/svg">
              <g transform="translate(30,10)">
                <template x-for="(v,i) in chartData" :key="i">
                  <g :transform="`translate(${i*42},0)`">
                    <rect :height="v.h" :y="110-v.h" width="26" rx="4" fill="#22c55e"/>
                    <text :x="13" :y="110-v.h-4" text-anchor="middle" class="text-[7px]" fill="#166534" font-size="7" font-weight="600" x-text="v.lbl"></text>
                    <text :x="13" y="122" text-anchor="middle" fill="#94a3b8" font-size="7" x-text="v.month"></text>
                  </g>
                </template>
              </g>
            </svg>
          </div>
          <!-- Status Tagihan -->
          <div class="bg-white rounded-md p-5 border border-gray-100">
            <p class="font-semibold text-gray-700 text-sm mb-4">Status Tagihan</p>
            <div class="space-y-3">
              <template x-for="t in tagihanStatus" :key="t.label">
                <div>
                  <div class="flex justify-between text-xs mb-1">
                    <span x-text="t.label" class="text-gray-600"></span>
                    <span x-text="t.pct+'%'" class="font-semibold" :style="`color:${t.color}`"></span>
                  </div>
                  <div class="h-2 bg-gray-100 rounded-full overflow-hidden">
                    <div :style="`width:${t.pct}%;background:${t.color}`" class="h-full rounded-full transition-all duration-700"></div>
                  </div>
                </div>
              </template>
            </div>
            <div class="mt-5 grid grid-cols-3 gap-2 text-center">
              <div class="bg-green-50 rounded-md p-2"><p class="text-base font-bold text-green-600">342</p><p class="text-[9px] text-gray-400">Lunas</p></div>
              <div class="bg-yellow-50 rounded-md p-2"><p class="text-base font-bold text-yellow-500">87</p><p class="text-[9px] text-gray-400">Jatuh Tempo</p></div>
              <div class="bg-red-50 rounded-md p-2"><p class="text-base font-bold text-red-500">34</p><p class="text-[9px] text-gray-400">Menunggak</p></div>
            </div>
          </div>
        </div>

        <!-- Recent activity -->
        <div class="bg-white rounded-md border border-gray-100 overflow-hidden">
          <div class="px-5 py-4 border-b border-gray-100 flex items-center justify-between">
            <p class="font-semibold text-gray-700 text-sm">Aktivitas Pembayaran Terbaru</p>
            <button @click="currentPage='laporan'" class="text-xs text-green-600 hover:underline font-medium">Lihat semua</button>
          </div>
          <div class="overflow-x-auto">
            <table class="w-full text-xs">
              <thead><tr class="bg-gray-50 text-gray-500 uppercase text-[10px]">
                <th class="px-4 py-3 text-left">Nama</th>
                <th class="px-4 py-3 text-left">NPWRD</th>
                <th class="px-4 py-3 text-left">Kelurahan</th>
                <th class="px-4 py-3 text-left">Periode</th>
                <th class="px-4 py-3 text-right">Nominal</th>
                <th class="px-4 py-3 text-center">Status</th>
              </tr></thead>
              <tbody>
                <template x-for="r in recentActivity" :key="r.id">
                  <tr class="table-row border-b border-gray-50 transition">
                    <td class="px-4 py-3 font-medium text-gray-700" x-text="r.nama"></td>
                    <td class="px-4 py-3 font-mono text-gray-500" x-text="r.npwrd"></td>
                    <td class="px-4 py-3 text-gray-500" x-text="r.kel"></td>
                    <td class="px-4 py-3 text-gray-500" x-text="r.periode"></td>
                    <td class="px-4 py-3 text-right font-semibold text-gray-700" x-text="r.nominal"></td>
                    <td class="px-4 py-3 text-center">
                      <span :class="r.status==='Lunas' ? 'badge-green' : r.status==='Menunggak' ? 'badge-red' : 'badge-yellow'"
                        class="text-[10px] px-2 py-0.5 rounded-full font-medium" x-text="r.status"></span>
                    </td>
                  </tr>
                </template>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </template>

    <!-- ======================================================
         OPERATOR DLHK (Admin Master only)
    ====================================================== -->
    <template x-if="currentPage==='op-dlhk'">
      <div class="space-y-4">
        <div class="flex flex-col sm:flex-row gap-3 items-start sm:items-center justify-between">
          <div class="flex gap-2">
            <div class="relative">
              <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs"></i>
              <input type="text" placeholder="Cari operator…" x-model="searchDLHK"
                class="pl-8 pr-3 py-2 text-xs border border-gray-200 rounded-md bg-white w-56"/>
            </div>
            <select x-model="filterDLHKStatus" class="text-xs border border-gray-200 rounded-md px-2 py-2 bg-white">
              <option value="">Semua Status</option>
              <option>Aktif</option><option>Nonaktif</option>
            </select>
          </div>
          <div class="flex items-center gap-3">
            <button @click="openModal('tempat-sampah',{ctx:'dlhk'})" class="text-xs font-medium text-gray-500 hover:text-red-500 transition flex items-center gap-1.5">
              <i class="fa-solid fa-trash-can"></i> Tempat Sampah
            </button>
            <button @click="openModal('tambah-dlhk')" class="btn-primary flex items-center gap-2 px-4 py-2 rounded-md text-xs font-semibold">
              <i class="fa-solid fa-plus"></i> Tambah Operator
            </button>
          </div>
        </div>

        <div class="bg-white rounded-md border border-gray-100 overflow-hidden">
          <table class="w-full text-xs">
            <thead><tr class="bg-gray-50 text-gray-500 uppercase text-[10px]">
              <th class="px-4 py-3 text-left">#</th>
              <th class="px-4 py-3 text-left">Nama</th>
              <th class="px-4 py-3 text-left">Username</th>
              <th class="px-4 py-3 text-left">No. HP</th>
              <th class="px-4 py-3 text-center">Status</th>
              <th class="px-4 py-3 text-center">Aksi</th>
            </tr></thead>
            <tbody>
              <template x-for="(op,i) in filteredDLHK()" :key="op.id">
                <tr class="table-row border-b border-gray-50">
                  <td class="px-4 py-3 text-gray-400" x-text="i+1"></td>
                  <td class="px-4 py-3 font-medium text-gray-700" x-text="op.nama"></td>
                  <td class="px-4 py-3 text-gray-500" x-text="op.username"></td>
                  <td class="px-4 py-3 text-gray-500" x-text="op.hp"></td>
                  <td class="px-4 py-3 text-center">
                    <span :class="op.status==='Aktif'?'badge-green':'badge-red'" class="text-[10px] px-2 py-0.5 rounded-full font-medium" x-text="op.status"></span>
                  </td>
                  <td class="px-4 py-3 text-center">
                    <div class="flex justify-center gap-1">
                      <button @click="openModal('edit-dlhk',op)" class="btn-secondary text-[10px] px-2 py-1 rounded-md"><i class="fa-solid fa-pen"></i></button>
                      <button @click="openModal('hapus',op)" class="btn-danger text-[10px] px-2 py-1 rounded-md"><i class="fa-solid fa-trash"></i></button>
                    </div>
                  </td>
                </tr>
              </template>
            </tbody>
          </table>
        </div>
      </div>
    </template>

    <!-- ======================================================
         OPERATOR KELURAHAN
    ====================================================== -->
    <template x-if="currentPage==='op-kelurahan'">
      <div class="space-y-4">
        <div class="flex flex-col sm:flex-row gap-3 items-start sm:items-center justify-between">
          <div class="flex gap-2">
            <div class="relative">
              <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs"></i>
              <input type="text" placeholder="Cari operator kelurahan…" x-model="searchKel"
                class="pl-8 pr-3 py-2 text-xs border border-gray-200 rounded-md bg-white w-60"/>
            </div>
            <select x-model="filterKelStatus" class="text-xs border border-gray-200 rounded-md px-2 py-2 bg-white">
              <option value="">Semua Wilayah</option>
              <option>Distrik Jayapura Utara</option><option>Distrik Jayapura Selatan</option><option>Distrik Abepura</option>
            </select>
          </div>
          <div class="flex items-center gap-3">
            <button @click="openModal('tempat-sampah',{ctx:'kel'})" class="text-xs font-medium text-gray-500 hover:text-red-500 transition flex items-center gap-1.5">
              <i class="fa-solid fa-trash-can"></i> Tempat Sampah
            </button>
            <button @click="openModal('tambah-kel')" class="btn-primary flex items-center gap-2 px-4 py-2 rounded-md text-xs font-semibold">
              <i class="fa-solid fa-plus"></i> Tambah Operator
            </button>
          </div>
        </div>
        <div class="bg-white rounded-md border border-gray-100 overflow-hidden">
          <table class="w-full text-xs">
            <thead><tr class="bg-gray-50 text-gray-500 uppercase text-[10px]">
              <th class="px-4 py-3 text-left">#</th>
              <th class="px-4 py-3 text-left">Nama</th>
              <th class="px-4 py-3 text-left">Kelurahan</th>
              <th class="px-4 py-3 text-left">Distrik</th>
              <th class="px-4 py-3 text-center">Status</th>
              <th class="px-4 py-3 text-center">Aksi</th>
            </tr></thead>
            <tbody>
              <template x-for="(op,i) in filteredKel()" :key="op.id">
                <tr class="table-row border-b border-gray-50">
                  <td class="px-4 py-3 text-gray-400" x-text="i+1"></td>
                  <td class="px-4 py-3 font-medium text-gray-700" x-text="op.nama"></td>
                  <td class="px-4 py-3 text-gray-500" x-text="op.kelurahan"></td>
                  <td class="px-4 py-3 text-gray-500" x-text="op.distrik"></td>
                  <td class="px-4 py-3 text-center">
                    <span :class="op.status==='Aktif'?'badge-green':'badge-red'" class="text-[10px] px-2 py-0.5 rounded-full" x-text="op.status"></span>
                  </td>
                  <td class="px-4 py-3 text-center">
                    <div class="flex justify-center gap-1">
                      <button @click="openModal('edit-kel',op)" class="btn-secondary text-[10px] px-2 py-1 rounded-md"><i class="fa-solid fa-pen"></i></button>
                      <button @click="openModal('hapus',op)" class="btn-danger text-[10px] px-2 py-1 rounded-md"><i class="fa-solid fa-trash"></i></button>
                    </div>
                  </td>
                </tr>
              </template>
            </tbody>
          </table>
        </div>
      </div>
    </template>

    <!-- ======================================================
         KLIEN
    ====================================================== -->
    <template x-if="currentPage==='klien'">
      <div class="space-y-4">
        <div class="flex flex-col sm:flex-row gap-3 items-start sm:items-center justify-between">
          <div class="flex gap-2 flex-wrap">
            <div class="relative">
              <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs"></i>
              <input type="text" placeholder="Cari klien / NPWRD / alamat…" x-model="searchKlien"
                class="pl-8 pr-3 py-2 text-xs border border-gray-200 rounded-md bg-white w-56"/>
            </div>
            <select x-model="filterKlienKel" class="text-xs border border-gray-200 rounded-md px-2 py-2 bg-white">
              <option value="">Semua Kelurahan</option>
              <template x-for="k in kelurahans" :key="k"><option x-text="k"></option></template>
            </select>
            <select x-model="filterKlienStatus" class="text-xs border border-gray-200 rounded-md px-2 py-2 bg-white">
              <option value="">Semua Status</option>
              <option>Aktif</option><option>Nonaktif</option>
            </select>
          </div>
          <div class="flex items-center gap-3">
            <button @click="openModal('tempat-sampah',{ctx:'klien'})" class="text-xs font-medium text-gray-500 hover:text-red-500 transition flex items-center gap-1.5">
              <i class="fa-solid fa-trash-can"></i> Tempat Sampah
            </button>
            <button @click="openModal('tambah-klien')" class="btn-primary flex items-center gap-2 px-4 py-2 rounded-md text-xs font-semibold">
              <i class="fa-solid fa-plus"></i> Tambah Klien
            </button>
          </div>
        </div>
        <div class="bg-white rounded-md border border-gray-100 overflow-hidden">
          <table class="w-full text-xs">
            <thead><tr class="bg-gray-50 text-gray-500 uppercase text-[10px]">
              <th class="px-4 py-3 text-left">#</th>
              <th class="px-4 py-3 text-left">Nama KK</th>
              <th class="px-4 py-3 text-left">NPWRD</th>
              <th class="px-4 py-3 text-left">Alamat</th>
              <th class="px-4 py-3 text-left">Kelurahan</th>
              <th class="px-4 py-3 text-left">Distrik</th>
              <th class="px-4 py-3 text-right">Tarif/Bln</th>
              <th class="px-4 py-3 text-center">Status</th>
              <th class="px-4 py-3 text-center">Aksi</th>
            </tr></thead>
            <tbody>
              <template x-for="(kl,i) in filteredKlien()" :key="kl.id">
                <tr class="table-row border-b border-gray-50">
                  <td class="px-4 py-3 text-gray-400" x-text="i+1"></td>
                  <td class="px-4 py-3 font-medium text-gray-700" x-text="kl.nama"></td>
                  <td class="px-4 py-3 font-mono text-gray-600" x-text="kl.npwrd"></td>
                  <td class="px-4 py-3 text-gray-500" x-text="kl.alamat"></td>
                  <td class="px-4 py-3 text-gray-500" x-text="kl.kelurahan"></td>
                  <td class="px-4 py-3 text-gray-500" x-text="kl.distrik"></td>
                  <td class="px-4 py-3 text-right font-semibold text-gray-700" x-text="kl.tarif"></td>
                  <td class="px-4 py-3 text-center">
                    <span :class="kl.status==='Aktif'?'badge-green':'badge-red'" class="text-[10px] px-2 py-0.5 rounded-full" x-text="kl.status"></span>
                  </td>
                  <td class="px-4 py-3 text-center">
                    <div class="flex justify-center gap-1">
                      <button @click="openModal('detail-klien',kl)" class="btn-warning text-[10px] px-2 py-1 rounded-md"><i class="fa-solid fa-eye"></i></button>
                      <button @click="openModal('edit-klien',kl)" class="btn-secondary text-[10px] px-2 py-1 rounded-md"><i class="fa-solid fa-pen"></i></button>

      return this.opDLHK.filter(o =>

    },
    filteredKel() {
      return this.opKelurahan.filter(o =>
        (o.nama.toLowerCase().includes(this.searchKel.toLowerCase()) || o.kelurahan.toLowerCase().includes(this.searchKel.toLowerCase())) &&
        (!this.filterKelStatus || o.distrik===this.filterKelStatus));

    filteredKlien() {
      return this.kliens.filter(k =>
        (k.nama.toLowerCase().includes(this.searchKlien.toLowerCase()) || k.alamat.toLowerCase().includes(this.searchKlien.toLowerCase()) || (k.npwrd||'').toLowerCase().includes(this.searchKlien.toLowerCase())) &&
        (!this.filterKlienKel || k.kelurahan===this.filterKlienKel) &&
        (!this.filterKlienStatus || k.status===this.filterKlienStatus));
    },
    filteredTagihan() {
      return this.tagihans.filter(t =>
        (t.periode.toLowerCase().includes(this.searchTagihan.toLowerCase())) &&
        (!this.filterTagihanStatus || t.status===this.filterTagihanStatus));
    },
    filteredLaporan() {
      return this.laporanData.filter(r =>
        (r.nama.toLowerCase().includes(this.searchLaporan.toLowerCase()) || r.kel.toLowerCase().includes(this.searchLaporan.toLowerCase()) || (r.npwrd||'').toLowerCase().includes(this.searchLaporan.toLowerCase())) &&
        (!this.filterLapBulan || r.periode.includes(this.filterLapBulan)) &&
        (!this.filterLapDistrik || r.distrik===this.filterLapDistrik) &&
        (!this.filterLapKel || r.kel===this.filterLapKel) &&
        (!this.filterLapStatus || r.status===this.filterLapStatus));
    },

    // Ekspor laporan langsung dari tabel HTML yang sedang tampil
    exportExcel() {
      const table = document.getElementById('tabelLaporan');
      if (!table) return;
      const content = '\ufeff<meta charset="utf-8">' + table.outerHTML;
      const blob = new Blob([content], { type: 'application/vnd.ms-excel;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'laporan-retribusi.xls';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      URL.revokeObjectURL(url);
      this.closeModal();
    },
